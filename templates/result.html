<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<div class="page-narrow">
<div class="view-card text-center">

<h2 class="brand-title">Analysis Result</h2>
<p class="subtitle">Prediction summary generated by the model.</p>

<div class="result-badge">
Diagnostic: <b>{{ result }}</b><br>
Confidence: {{ prob }}%
</div>

<img src="{{ img }}" class="result-image" alt="Uploaded lesion image">

<br><br>
<a class="btn btn-modern btn-primary-modern" href="/dashboard">Back to Dashboard</a>

</div>
</div>
